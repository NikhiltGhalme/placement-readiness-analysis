<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Placement Readiness Analysis{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; transition: opacity 0.3s; }
        .fade-out { opacity: 0; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Nav -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="/" class="text-xl font-bold text-indigo-600">Placement Analysis</a>
                <div class="flex space-x-6">
                    <a href="/readiness" class="text-gray-700 hover:text-indigo-600 font-medium transition">Readiness Checker</a>
                    <a href="/analysis" class="text-gray-700 hover:text-indigo-600 font-medium transition">ML Analysis</a>
                    <a href="/generator" class="text-gray-700 hover:text-indigo-600 font-medium transition">Data Generator</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t mt-auto py-4 text-center text-sm text-gray-500">
        Indira College of Commerce and Science | S.Y M.Sc. (Comp.Sci) - Sem IV | 2025-26
    </footer>

    <div id="toast-container"></div>

    <script>
    function showToast(message, type = 'info') {
        const colors = { info: 'bg-blue-500', success: 'bg-green-500', error: 'bg-red-500' };
        const div = document.createElement('div');
        div.className = `toast ${colors[type] || colors.info} text-white px-6 py-3 rounded-lg shadow-lg`;
        div.textContent = message;
        document.getElementById('toast-container').appendChild(div);
        setTimeout(() => { div.classList.add('fade-out'); setTimeout(() => div.remove(), 300); }, 3000);
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
